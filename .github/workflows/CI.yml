name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
    - uses: actions/checkout@v4.1.0
    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
    - run: mkdir -p snapshots && nix develop --command ./scripts/ci
    - name: Upload test artifacts
      uses: actions/upload-artifact@v4
      with:
        name: snapshots
        path: |
          snapshots
